<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Engineering College Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 12px;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Engineering College Predictor</h2>
    <input type="number" id="jeeRank" placeholder="Enter JEE Main Rank">
    <input type="number" id="percentile" placeholder="Enter 12th Board Percentile">
    <br>
    <button onclick="predictCollege()">Predict College</button>
    <div id="result"></div>
  </div>

  <script>
    function predictCollege() {
      const rank = parseInt(document.getElementById('jeeRank').value);
      const percentile = parseFloat(document.getElementById('percentile').value);
      let result = "";

      if (isNaN(rank) || isNaN(percentile)) {
        result = "Please enter valid numbers.";
      } else if (rank <= 5000 && percentile >= 90) {
        result = "You can get into top-tier IITs or NITs!";
      } else if (rank <= 25000 && percentile >= 80) {
        result = "Chances are good for NITs and top state colleges.";
      } else if (rank <= 50000 && percentile >= 70) {
        result = "You may get admission in decent private universities or state colleges.";
      } else {
        result = "Consider private colleges or use state quota; improve in next attempt if possible.";
      }

      document.getElementById('result').textContent = result;
    }
  </script>

</body>
</html>
