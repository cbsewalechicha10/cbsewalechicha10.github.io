<!DOCTYPE html>
<html>
<head>
    <title>Screen and Webcam Access</title>
</head>
<body>
    <video id="webcam" autoplay></video>
    <video id="screen" autoplay></video>

    <script>
        const webcamVideo = document.getElementById('webcam');
        const screenVideo = document.getElementById('screen');

        // Request both video and screen sharing
        const constraints = {
            video: true,
            audio: true, // Add this line if you want to capture audio as well
        };

        if (navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function (stream) {
                    // Split the stream into two: one for webcam and one for screen
                    webcamVideo.srcObject = new MediaStream([stream.getVideoTracks()[0]]);
                    
                    // Add screen sharing track
                    const screenTrack = stream.getTracks().find(track => track.kind === 'video' && track !== stream.getVideoTracks()[0]);
                    if (screenTrack) {
                        screenVideo.srcObject = new MediaStream([screenTrack]);
                    }
                })
                .catch(function (error) {
                    console.log("Something went wrong!");
                });
        }
    </script>
</body>
</html>
