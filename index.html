<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Language Code Runner</title>
  <!-- Ace Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.14/ace.js" integrity="sha512-+Tt6OktYpPRGvNPZnlzUFTgEQJVbSv3hE5B/p1xpweUoMZs/Z1+hnX49dQTVYQU9M5Jk+oLZl2wD+qflg0hMVA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Skulpt for Python -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt-stdlib.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
    #controls { padding: 10px; background: #f4f4f4; display: flex; gap: 10px; align-items: center; }
    #editor { flex: 1; }
    #output { flex: 1; border-top: 1px solid #ddd; }
    iframe { width: 100%; height: 100%; border: none; }
    pre { margin: 0; padding: 10px; height: 100%; overflow: auto; background: #272822; color: #f8f8f2; }
  </style>
</head>
<body>
  <div id="controls">
    <label for="lang">Language:</label>
    <select id="lang">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
    </select>
    <button id="run">Run</button>
  </div>
  <div id="editor"></div>
  <div id="output"></div>

  <script>
    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/html");
    editor.session.setValue("<!-- write your code here -->");

    const langSelect = document.getElementById('lang');
    const runBtn = document.getElementById('run');
    const outputDiv = document.getElementById('output');

    langSelect.addEventListener('change', () => {
      const lang = langSelect.value;
      editor.session.setMode(`ace/mode/${lang}`);
    });

    runBtn.addEventListener('click', () => {
      const code = editor.getValue();
      const lang = langSelect.value;
      outputDiv.innerHTML = '';

      if (lang === 'html' || lang === 'css' || lang === 'javascript') {
        const iframe = document.createElement('iframe');
        outputDiv.appendChild(iframe);
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        let content = '';
        if (lang === 'html') {
          content = code;
        } else if (lang === 'css') {
          content = `<style>${code}</style>`;
        } else if (lang === 'javascript') {
          content = `<script>${code}<\/script>`;
        }
        doc.open();
        doc.write(content);
        doc.close();
      } else if (lang === 'python') {
        function builtinRead(x) {
          if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined)
            throw `File not found: '${x}'`;
          return Sk.builtinFiles['files'][x];
        }
        Sk.configure({
          output: text => {
            let pre = outputDiv.querySelector('pre');
            if (!pre) {
              pre = document.createElement('pre');
              outputDiv.appendChild(pre);
            }
            pre.textContent += text;
          },
          read: builtinRead
        });
        Sk.importMainWithBody('<stdin>', false, code, true)
          .catch(err => {
            outputDiv.innerHTML = '<pre>' + err.toString() + '</pre>';
          });
      } else {
        outputDiv.innerHTML = `<pre>Language '${lang}' is not supported yet.</pre>`;
      }
    });
  </script>
</body>
</html>
