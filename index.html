<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam and Random Krishna Image</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: 'Arial', sans-serif;
        }

        .half {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            margin: 5px;
            border-radius: 10px;
            overflow: hidden;
        }

        #webcam {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        #krishnaImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="half">
        <div class="box">
            <video id="webcam" autoplay></video>
        </div>
    </div>
    <div class="half">
        <div class="box">
            <img id="krishnaImage" src="" alt="Random Krishna Image">
        </div>
    </div>

    <script>
        const webcamVideo = document.getElementById('webcam');
        const krishnaImage = document.getElementById('krishnaImage');

        const constraints = {
            video: true,
            audio: false
        };

        if (navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function (stream) {
                    webcamVideo.srcObject = stream;
                })
                .catch(function (error) {
                    console.log('Error accessing webcam:', error);
                });
        }

        // Fetch a random Krishna image from Unsplash Source API
        fetch('https://source.unsplash.com/featured/?krishna')
            .then(response => {
                krishnaImage.src = response.url;
            })
            .catch(error => {
                console.log('Error fetching Krishna image:', error);
            });
    </script>
</body>
</html>
