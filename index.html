<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #chat-container {
            width: 50%;
            margin: auto;
            border: 1px solid black;
            padding: 10px;
            margin-top: 50px;
            background-color: #f9f9f9;
        }
        #messages {
            height: 300px;
            border: 1px solid black;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #ffffff;
        }
        #message-input {
            display: flex;
            margin-bottom: 10px;
        }
        #message-input input {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #message-input button {
            width: 20%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #message-input button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <h2>Welcome to the Chat!</h2>

        <div id="login-input">
            <input type="text" id="username" placeholder="Enter your name" required>
            <button onclick="login()">Submit</button>
        </div>

        <div id="chat-section" style="display:none;">
            <div id="messages">
                <!-- Messages will appear here -->
            </div>
            <div id="message-input">
                <input type="text" id="message" placeholder="Type your message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let username = '';
        let isAdmin = false;
        let messages = [];

        // Login logic
        function login() {
            const nameInput = document.getElementById('username');
            username = nameInput.value.trim();

            if (username) {
                // Check if the user is the admin
                if (username.toLowerCase() === 'admin') {
                    isAdmin = true;
                    document.getElementById('login-input').style.display = 'none';
                    document.getElementById('chat-section').style.display = 'block';
                    displayMessages();  // Admin can see all messages
                } else {
                    document.getElementById('login-input').style.display = 'none';
                    document.getElementById('chat-section').style.display = 'block';
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML += `<p><strong>${username}</strong> joined the chat!</p>`;
                }
            }
        }

        // Function to send a message
        function sendMessage() {
            const messageInput = document.getElementById('message');
            const message = messageInput.value.trim();

            if (message) {
                // Store the message in an array
                const messageObject = {
                    user: username,
                    text: message,
                };
                messages.push(messageObject);

                // Show the message to the user
                const messagesDiv = document.getElementById('messages');
                if (isAdmin) {
                    displayMessages();  // Admin can see all messages
                } else {
                    messagesDiv.innerHTML += `<p>Your message has been sent.</p>`;
                }

                messageInput.value = '';  // Clear the input field
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // Function to display all messages to the admin
        function displayMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';  // Clear existing messages
            messages.forEach(msg => {
                messagesDiv.innerHTML += `<p><strong>${msg.user}:</strong> ${msg.text}</p>`;
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>

</body>
</html>
