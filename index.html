<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two‑Box Multi‑Language Runner</title>
  <!-- Skulpt for in‑browser Python: -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt-stdlib.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    label, select, button { font-size: 1rem; }
    textarea {
      width: 100%; box-sizing: border-box;
      font-family: monospace; font-size: 1rem;
      margin-top: 10px; padding: 8px;
    }
    #codeBox { height: 200px; }
    #outputContainer { margin-top: 10px; }
    #outputText { width: 100%; height: 200px; background: #f0f0f0; }
    iframe { width: 100%; height: 200px; border: 1px solid #ccc; }
    button { margin-top: 10px; padding: 8px 16px; }
  </style>
</head>
<body>

  <label for="lang">Language:</label>
  <select id="lang">
    <option value="html">HTML</option>
    <option value="css">CSS</option>
    <option value="javascript">JavaScript</option>
    <option value="python">Python</option>
    <!-- e.g. add: <option value="java">Java</option>, <option value="c">C</option> … -->
  </select>

  <!-- INPUT BOX -->
  <textarea id="codeBox" placeholder="Type your code here…"></textarea>
  <button id="runBtn">Run</button>

  <!-- OUTPUT PANE -->
  <div id="outputContainer"></div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const langSel = document.getElementById('lang');
    const codeBox = document.getElementById('codeBox');
    const outputContainer = document.getElementById('outputContainer');

    runBtn.addEventListener('click', () => {
      const code = codeBox.value;
      const lang = langSel.value;
      outputContainer.innerHTML = '';

      if (lang === 'html' || lang === 'css') {
        // render preview in iframe
        const iframe = document.createElement('iframe');
        outputContainer.appendChild(iframe);
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (lang === 'html') {
          doc.open(); doc.write(code); doc.close();
        } else {
          // wrap CSS in <style>
          doc.open();
          doc.write(`<html><head><style>${code}</style></head><body></body></html>`);
          doc.close();
        }

      } else if (lang === 'javascript') {
        // capture console.log + return value
        const outTA = document.createElement('textarea');
        outTA.id = 'outputText';
        outTA.readOnly = true;
        outputContainer.appendChild(outTA);

        // override console.log
        const log = console.log;
        console.log = function(...args) {
          outTA.value += args.join(' ') + '\\n';
          log.apply(console, args);
        };

        try {
          const result = eval(code);
          if (result !== undefined) outTA.value += String(result) + '\\n';
        } catch (err) {
          outTA.value += err + '\\n';
        }
        console.log = log;  // restore

      } else if (lang === 'python') {
        // use Skulpt
        const outTA = document.createElement('textarea');
        outTA.id = 'outputText';
        outTA.readOnly = true;
        outputContainer.appendChild(outTA);

        function builtinRead(x) {
          if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined)
            throw `File not found: '${x}'`;
          return Sk.builtinFiles['files'][x];
        }

        Sk.configure({
          output: txt => { outTA.value += txt; },
          read: builtinRead
        });

        Sk.importMainWithBody('<stdin>', false, code, true)
          .catch(err => { outTA.value += err.toString() + '\\n'; });

      } else {
        // placeholder for other languages
        const outTA = document.createElement('textarea');
        outTA.id = 'outputText';
        outTA.readOnly = true;
        outTA.value = `Execution for “${lang}” not implemented.\n` +
          `Would you like an in‑browser compiler (e.g. via WebAssembly) or a server endpoint?`;
        outputContainer.appendChild(outTA);
      }
    });
  </script>
</body>
</html>
