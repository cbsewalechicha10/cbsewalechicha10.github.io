<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mai aur woh anandit</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background-color: #fff;
            font-family: 'Arial', sans-serif;
            color: #000;
        }
        .streaming {
            flex: 0.7;
            display: flex;
            flex-direction: column;
        }
        .webcam {
            flex: 0.3;
            display: flex;
            flex-direction: column;
        }
        .box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            margin: 5px;
            border-radius: 10px;
            overflow: hidden;
        }
        #webcam1, #webcam2 {
            width: 100%;
            height: 50%;
            border-radius: 10px;
        }
        #youtubeVideo {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        .button-container {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }
        .button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #000;
            color: #fff;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="streaming">
        <div class="box">
            <div id="youtubeVideo"></div>
        </div>
    </div>
    <div class="webcam">
        <div class="box">
            <video id="webcam1" autoplay></video>
        </div>
        <div class="box">
            <video id="webcam2" autoplay></video>
        </div>
        <div class="button-container">
            <button class="button" id="micButton">🎙️</button>
            <button class="button" id="camButton">📷</button>
        </div>
    </div>

    <script>
        const webcamVideo1 = document.getElementById('webcam1');
        const webcamVideo2 = document.getElementById('webcam2');
        const youtubeVideoContainer = document.getElementById('youtubeVideo');
        const micButton = document.getElementById('micButton');
        const camButton = document.getElementById('camButton');

        let isMicOn = true;
        let isCamOn = true;

        const constraints = {
            video: true,
            audio: true
        };
        if (navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function (stream) {
                    webcamVideo1.srcObject = stream;
                    webcamVideo2.srcObject = stream;
                })
                .catch(function (error) {
                    console.log('Error accessing webcam:', error);
                });
        }

        const youtubeVideoId = prompt("Please enter the YouTube video ID:");
        const script = document.createElement('script');
        script.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(script);
        window.onYouTubeIframeAPIReady = function () {
            new YT.Player('youtubeVideo', {
                videoId: youtubeVideoId,
                playerVars: {
                    autoplay: 1,  
                    loop: 1,      
                    controls: 0,  
                    showinfo: 0,  
                    modestbranding: 1  
                },
                events: {
                    onReady: function (event) {
                        event.target.playVideo();  
                    }
                }
            });
        };

        micButton.addEventListener('click', function() {
            isMicOn = !isMicOn;
            webcamVideo1.srcObject.getAudioTracks()[0].enabled = isMicOn;
            webcamVideo2.srcObject.getAudioTracks()[0].enabled = isMicOn;
        });

        camButton.addEventListener('click', function() {
            isCamOn = !isCamOn;
            webcamVideo1.srcObject.getVideoTracks()[0].enabled = isCamOn;
            webcamVideo2.srcObject.getVideoTracks()[0].enabled = isCamOn;
        });
    </script>
</body>
</html>
